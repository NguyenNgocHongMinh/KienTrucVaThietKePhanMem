spring.application.name=OrderService

# Server Configuration - Cho phÈp truy c?p t? m?ng LAN
# L?ng nghe trÍn t?t c? c·c network interfaces (0.0.0.0)
server.address=0.0.0.0
server.port=8080

# Database Configuration - MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/order_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=sapassword
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Security Configuration
# B?t/t?t Spring Security (m?c ??nh ?„ b?t qua SecurityConfig.java)
# spring.security.user.name=admin
# spring.security.user.password=admin123

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
