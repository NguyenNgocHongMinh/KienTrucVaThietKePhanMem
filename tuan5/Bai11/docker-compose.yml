version: "3.9"
services:
  postgres:
    image: postgres
    container_name: pg_bai11
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: adminer_bai11
    ports:
      - "8083:8080"